# BillTime self-host. `docker compose up -d` then open http://localhost:3939
# Host port is 3939 (not 3000) to avoid clashing with other local containers.
#
# Shared database: the container bind-mounts the repo's ./prisma directory, so it
# uses the SAME SQLite file as `npm run dev` (prisma/dev.db) - one DB either way.
# Run only ONE at a time (npm OR docker): two writers on one SQLite file can
# clash. Back up by copying prisma/dev.db.
services:
  billtime:
    build: .
    image: billtime:latest
    container_name: billtime
    ports:
      - "3939:3000"
    environment:
      - DATABASE_URL=file:/app/prisma/dev.db
    volumes:
      - ./prisma:/app/prisma
    restart: unless-stopped
