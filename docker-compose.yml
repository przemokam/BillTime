# BillTime self-host. `docker compose up -d` then open http://localhost:3939
# Host port is 3939 (not 3000) to avoid clashing with other local containers.
# Change the left side of the mapping below if 3939 is taken too.
# Your data lives in the named volume `billtime-data` (the SQLite file), so it
# survives container rebuilds. Back it up by copying /data/billtime.db out.
services:
  billtime:
    build: .
    image: billtime:latest
    container_name: billtime
    ports:
      - "3939:3000"
    environment:
      - DATABASE_URL=file:/data/billtime.db
      # Optional: Claude Code suggestion chip (hours + session topics) inside the
      # container — also uncomment the read-only transcript mount below.
      # - BILLTIME_CC_DIR=/cc
      # Optional: make the AI "sum" button work in the container via the Anthropic
      # API. Put ANTHROPIC_API_KEY in a local .env file (never commit it) — compose
      # substitutes it here. Optionally pin a cheaper model (e.g. claude-haiku-4-5).
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY:-}
      - ANTHROPIC_MODEL=${ANTHROPIC_MODEL:-}
    volumes:
      - billtime-data:/data
      # - ${HOME}/.claude/projects:/cc:ro
    restart: unless-stopped

volumes:
  billtime-data:
